name: scintilla
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Python runtime
  - python>=3.11,<3.14

  # Geospatial / GIS C-extension stack (install via conda to avoid
  # GDAL/PROJ/GEOS ABI mismatches that pip-only installs commonly hit)
  - gdal>=3.7
  - proj>=9.3
  - geos>=3.12
  - cartopy>=0.22
  - geopandas>=0.14
  - shapely>=2.0
  - fiona>=1.9
  - pyproj>=3.6
  - rasterio>=1.3
  - rioxarray>=0.15
  - xarray>=2024.1
  - netcdf4>=1.6
  - h5py>=3.10

  # Scientific stack
  - numpy>=1.26
  - pandas>=2.1
  - pyarrow>=15
  - scikit-image>=0.22

  # Video encoding (ffmpeg CLI + Python wrapper is pip)
  - ffmpeg>=6.0

  # OpenCV (used by chips_to_polygons.py)
  - opencv>=4.8

  # Dev tools
  - pytest>=7
  - pytest-cov
  - ruff

  # Pure-Python deps installed via pip (faster/lighter than conda-forge builds)
  - pip
  - pip:
      - earthaccess
      - ffmpeg-python
      - folium
      - geojsonio
      - joblib
      - python-dotenv
      - timezonefinder
      - tqdm
      - psutil
      - boto3
      - pytz
      # Install the scintilla package itself in editable mode
      - -e .
